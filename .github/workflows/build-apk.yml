name: 构建加固版 APK (手动触发)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 安装 Android SDK 命令行工具(用 action,自动管 sdkmanager)
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools: latest

      - name: 接受 Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: 安装 platforms 和 build-tools(锁 35,稳)
        run: |
          echo "=== 当前已安装的包 ==="
          sdkmanager --list_installed 2>&1 | head -30 || true
          echo ""
          echo "=== 安装 platforms;android-35 和 build-tools;35.0.0 ==="
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: 用 sed 临时把 compileSdk / targetSdk 改成 35
        run: |
          echo "=== 改写前的 build.gradle.kts(compileSdk 一段)==="
          grep -n -E 'compileSdk|targetSdk' app/build.gradle.kts || true
          # 临时把 compileSdk = 37 → 35,targetSdk = 37 → 35
          # 备份原文件
          cp app/build.gradle.kts app/build.gradle.kts.bak
          sed -i -E 's/(compileSdk\s*=\s*)[0-9]+/\135/' app/build.gradle.kts
          sed -i -E 's/(targetSdk\s*=\s*)[0-9]+/\135/' app/build.gradle.kts
          echo "=== 改写后的 build.gradle.kts(compileSdk 一段)==="
          grep -n -E 'compileSdk|targetSdk' app/build.gradle.kts || true

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 prod release APK
        run: ./gradlew assembleProdRelease --no-daemon --stacktrace

      - name: 定位 APK
        id: locate-apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/prod/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: 没找到 APK 文件"
            find app/build/outputs -type f -name "*.apk" -o -name "*.aab" 2>/dev/null
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "APK 找到: $APK_PATH"

      - name: 上传 APK 作为 artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiguangschedule-prod-release
          path: ${{ steps.locate-apk.outputs.apk_path }}
          retention-days: 7
          if-no-files-found: error
