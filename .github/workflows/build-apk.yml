name: 构建加固版 APK (手动触发)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # setup-android@v3 在 runner 上自动:
      # - 检测预装 cmdline-tools 12.0 不兼容,装 16.0
      # - 接受所有 Android SDK licenses
      # - 接受 packages: 指定的包
      # 日志证明:cmdline-tools 16.0 + platform-tools 都装成功
      # 现在再加 platforms;android-37 和 build-tools;37.0.0,符合
      # 项目 compileSdk=37 + 23 个依赖的 metadata 要求
      - name: 安装 Android SDK(包括 platforms;android-37)
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719
          accept-android-sdk-licenses: true
          packages: |
            platforms;android-37
            build-tools;37.0.0
            platform-tools

      - name: 验证 SDK 已装
        run: |
          echo "=== 已安装的 SDK 包 ==="
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed 2>&1 | head -20
          echo ""
          ls -la $ANDROID_HOME/platforms/ $ANDROID_HOME/build-tools/

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建 prod release APK(compileSdk=37 不动)
        run: ./gradlew assembleProdRelease --no-daemon --stacktrace

      - name: 定位 APK
        id: locate-apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/prod/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: 没找到 APK"
            find app/build/outputs -type f -name "*.apk" -o -name "*.aab" 2>/dev/null || true
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "APK: $APK_PATH"

      - name: 上传 APK 作为 artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiguangschedule-prod-release
          path: ${{ steps.locate-apk.outputs.apk_path }}
          retention-days: 7
          if-no-files-found: error
