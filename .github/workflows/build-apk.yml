name: 构建加固版 APK (手动触发)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # 1) 装 cmdline-tools(action 的 preinstalled 12.0 不兼容,
      # action 自动装 16.0,但不装 platforms,只装 cmdline-tools)
      - name: 安装 cmdline-tools
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 12266719

      # 2) 显式 accept 所有 SDK licenses
      #    用 yes 自动回 y,绕开 setup-android@v3 自身的 license 卡住 bug
      - name: 接受所有 Android SDK licenses
        run: |
          yes 2>/dev/null | $ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager --licenses 2>&1 | tail -5
          echo "Licenses accepted (above如果看到 'All SDK package licenses accepted')"

      # 3) 装 platforms;android-37 + build-tools;37.0.0 + platform-tools
      - name: 装 SDK 包(compileSdk=37 需要 37)
        run: |
          $ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager \
            "platforms;android-37" \
            "build-tools;37.0.0" \
            "platform-tools" 2>&1 | tail -20
          echo "=== 已装的包 ==="
          $ANDROID_HOME/cmdline-tools/16.0/bin/sdkmanager --list_installed 2>&1 | head -20

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      # 4) 构建(compileSdk=37 不动,符合 23 个依赖要求)
      - name: 构建 prod release APK
        run: ./gradlew assembleProdRelease --no-daemon --stacktrace

      - name: 定位 APK
        id: locate-apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/prod/release -name "*.apk" | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: 没找到 APK"
            find app/build/outputs -type f -name "*.apk" -o -name "*.aab" 2>/dev/null || true
            exit 1
          fi
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "APK: $APK_PATH"

      - name: 上传 APK 作为 artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiguangschedule-prod-release
          path: ${{ steps.locate-apk.outputs.apk_path }}
          retention-days: 7
          if-no-files-found: error
