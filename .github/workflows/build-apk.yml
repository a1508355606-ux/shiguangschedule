name: 构建加固版 APK (手动触发)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_HOME: /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk/21.0.11-10/x64

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 设置 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 验证预装 Android SDK 组件
        run: |
          echo "=== 已安装的 Android SDK 组件 ==="
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list_installed 2>/dev/null || echo "(sdkmanager 不可用,跳过检查)"
          echo ""
          echo "=== ANDROID_HOME=$ANDROID_HOME ==="
          ls -la $ANDROID_HOME/

      - name: 安装 compileSdk 所需的 platforms;android-37(如果缺失)
        run: |
          if [ -d "$ANDROID_HOME/platforms/android-37" ]; then
            echo "[OK] platforms;android-37 已安装,跳过"
          else
            echo "[INFO] 安装 platforms;android-37..."
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-37"
          fi

      - name: 安装 build-tools;37.0.0(如果缺失)
        run: |
          if [ -d "$ANDROID_HOME/build-tools/37.0.0" ]; then
            echo "[OK] build-tools;37.0.0 已安装,跳过"
          else
            echo "[INFO] 安装 build-tools;37.0.0..."
            yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;37.0.0"
          fi

      - name: 接受 Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: 构建加固版 prod release APK
        run: ./gradlew assembleProdRelease --no-daemon --stacktrace

      - name: 定位 APK
        id: locate-apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/prod/release -name "*.apk" | head -1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          echo "APK: $APK_PATH"

      - name: 上传 APK 作为 artifact
        uses: actions/upload-artifact@v4
        with:
          name: shiguangschedule-prod-release
          path: ${{ steps.locate-apk.outputs.apk_path }}
          retention-days: 7
